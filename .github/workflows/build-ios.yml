name: Build iOS (Unsigned IPA)

on: workflow_dispatch

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: Build unsigned IPA
        run: |
          cd ios
          xcodebuild clean archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          cd ..

      - name: Export unsigned IPA
        run: |
          mkdir -p ios/ExportOptions
          /usr/libexec/PlistBuddy -c "Add method string development" ios/ExportOptions/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add signingStyle string manual" ios/ExportOptions/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add uploadBitcode bool false" ios/ExportOptions/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add uploadSymbols bool false" ios/ExportOptions/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add compileBitcode bool false" ios/ExportOptions/ExportOptions.plist
          cd ios
          xcodebuild -exportArchive \
            -archivePath ../build/ios/Runner.xcarchive \
            -exportOptionsPlist ExportOptions/ExportOptions.plist \
            -exportPath ../build/ios/iphoneos
          cd ..
          cp build/ios/iphoneos/*.ipa build/GigsCourt.ipa 2>/dev/null || cp build/ios/iphoneos/Runner.ipa build/GigsCourt.ipa 2>/dev/null || echo "IPA ready"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-iOS-Unsigned
          path: build/GigsCourt.ipa
